<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="Finance Master is a calm, local-first treasury cockpit for cash clarity, reserves, obligations, runway, and income scenarios."
    />
    <link rel="icon" href="data:," />
    <title>Finance Master</title>
  </head>
  <body class="mode-financial">
    <div class="finance-master-atmosphere" aria-hidden="true"></div>
    <div class="finance-master-shell">
      <aside class="finance-master-sidebar" aria-label="Finance Master sections">
        <div class="finance-master-sidebar-head">
          <div class="finance-master-kicker">Local-first treasury</div>
          <div class="finance-master-brand">Finance Master</div>
        </div>
        <button class="finance-master-button finance-master-button--accent finance-master-add" type="button" data-action="openEditModal" data-action-args="'quickAdd'">
          + Add
        </button>
        <nav class="finance-master-nav" aria-label="Primary finance navigation">
          <button class="finance-master-button" type="button" data-action="FinancialMode.setSection" data-action-args="'dashboard'" data-fin-nav="dashboard">
            Today
          </button>
          <button class="finance-master-button" type="button" data-action="FinancialMode.setSection" data-action-args="'ledger'" data-fin-nav="ledger">
            Transactions
          </button>
          <button class="finance-master-button" type="button" data-action="FinancialMode.setSection" data-action-args="'invoices'" data-fin-nav="invoices">
            Invoices
          </button>
          <button class="finance-master-button" type="button" data-action="FinancialMode.setSection" data-action-args="'planning'" data-fin-nav="planning">
            Cashflow Plan
          </button>
          <button class="finance-master-button" type="button" data-action="FinancialMode.setSection" data-action-args="'review'" data-fin-nav="review">
            Monthly Review
          </button>
          <button class="finance-master-button" type="button" data-action="FinancialMode.setSection" data-action-args="'reports'" data-fin-nav="reports">
            Reports
          </button>
          <button class="finance-master-button" type="button" data-action="FinancialMode.setSection" data-action-args="'data'" data-fin-nav="data">
            Import & Backup
          </button>
          <button class="finance-master-button" type="button" data-action="FinancialMode.setSection" data-action-args="'settings'" data-fin-nav="settings">
            Settings
          </button>
        </nav>
        <div class="finance-master-sidebar-foot">
          <span>Local data</span>
          <strong>Private browser storage</strong>
          <span>Currency follows Settings</span>
        </div>
      </aside>

      <div class="finance-master-main">
        <header class="finance-master-topbar">
          <div>
            <div class="finance-master-kicker">Finance Cockpit</div>
            <div class="finance-master-brand">Your observatory for cashflow, reserves, and decisions.</div>
          </div>
          <div class="finance-master-actions">
            <button class="finance-master-button finance-master-button--accent" type="button" data-action="openEditModal" data-action-args="'quickAdd'">
              + Add
            </button>
          </div>
        </header>

        <main class="financial-dashboard" id="dashboard-financial">
          <div id="financial-hero-slot"></div>
          <div class="fin-focus-bar">
            <div class="widget-title ui-title">Finance Cockpit</div>
          </div>
          <div id="fin-content-area"></div>
        </main>
      </div>
    </div>

    <div class="modal-overlay" id="modal-overlay" aria-hidden="true">
      <div class="modal-content" id="modal-content" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <button class="modal-close" type="button" data-action="closeModal" aria-label="Close">&times;</button>
        <div id="modal-body"></div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
