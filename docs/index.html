<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="Finance Master is a calm, local-first treasury cockpit for cash clarity, reserves, obligations, runway, and income scenarios."
    />
    <link rel="icon" href="data:," />
    <title>Finance Master</title>
    <script type="module" crossorigin src="/finance-master/assets/index-BZBt9EBl.js"></script>
    <link rel="stylesheet" crossorigin href="/finance-master/assets/index-BFqLTUYE.css">
  </head>
  <body class="mode-financial">
    <div class="finance-master-atmosphere" aria-hidden="true"></div>
    <div class="finance-master-shell">
      <div class="finance-master-mobile-bar">
        <div>
          <div class="finance-master-kicker">Local-first treasury</div>
          <div class="finance-master-brand">Finance Master</div>
        </div>
        <button
          class="finance-master-menu-toggle"
          type="button"
          data-action="FinancialMode.toggleMobileNav"
          aria-label="Open navigation"
          aria-controls="primary-finance-navigation"
          aria-expanded="false"
        >
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
        </button>
      </div>
      <button class="finance-master-nav-scrim" type="button" data-action="FinancialMode.closeMobileNav" aria-label="Close navigation"></button>
      <aside class="finance-master-sidebar" aria-label="Finance Master sections">
        <div class="finance-master-sidebar-head">
          <div class="finance-master-kicker">Local-first treasury</div>
          <div class="finance-master-brand">Finance Master</div>
        </div>
        <nav class="finance-master-nav" id="primary-finance-navigation" aria-label="Primary finance navigation">
          <button class="finance-master-button" type="button" data-action="FinancialMode.setSection" data-action-args="'dashboard'" data-fin-nav="dashboard">
            Money Status
          </button>
          <button class="finance-master-button" type="button" data-action="FinancialMode.setSection" data-action-args="'decisions'" data-fin-nav="decisions">
            Decision Lab
          </button>
          <button class="finance-master-button" type="button" data-action="FinancialMode.setSection" data-action-args="'flow'" data-fin-nav="flow">
            Cash Timeline
          </button>
          <button class="finance-master-button" type="button" data-action="FinancialMode.setSection" data-action-args="'plan'" data-fin-nav="plan">
            Money Plan
          </button>
          <button class="finance-master-button" type="button" data-action="FinancialMode.setSection" data-action-args="'radar'" data-fin-nav="radar">
            Risk Radar
          </button>
          <button class="finance-master-button" type="button" data-action="FinancialMode.setSection" data-action-args="'review'" data-fin-nav="review">
            Reality Check
          </button>
          <button class="finance-master-button" type="button" data-action="FinancialMode.setSection" data-action-args="'logbook'" data-fin-nav="logbook">
            Records
          </button>
          <button class="finance-master-button" type="button" data-action="FinancialMode.setSection" data-action-args="'settings'" data-fin-nav="settings">
            Settings
          </button>
        </nav>
        <div class="finance-master-sidebar-foot">
          <span>Local data</span>
          <strong>Private browser storage</strong>
          <span>Currency follows Settings</span>
        </div>
      </aside>

      <div class="finance-master-main">
        <main class="financial-dashboard" id="dashboard-financial">
          <div id="fin-content-area"></div>
        </main>
      </div>

      <!-- Floating Action Button -->
      <button class="fin-fab-add" type="button" data-action="toggleQuickActionMenu" aria-label="New entry" aria-expanded="false" aria-controls="quick-action-menu">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </button>
      <div class="fin-quick-action-menu" id="quick-action-menu" aria-hidden="true">
      </div>

    </div>

    <div class="modal-overlay" id="modal-overlay" aria-hidden="true">
      <div class="modal-content" id="modal-content" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <button class="modal-close" type="button" data-action="closeModal" aria-label="Close">&times;</button>
        <div id="modal-body"></div>
      </div>
    </div>

  </body>
</html>
